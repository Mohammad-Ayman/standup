services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: standup
      POSTGRES_USER: standup
      POSTGRES_PASSWORD: standup
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U standup -d standup"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    command: npm run db:migrate
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgres://standup:standup@postgres:5432/standup
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgres://standup:standup@postgres:5432/standup
    depends_on:
      migrate:
        condition: service_completed_successfully

  worker:
    build: .
    command: npm run worker
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgres://standup:standup@postgres:5432/standup
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
